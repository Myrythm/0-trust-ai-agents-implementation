{% extends "base.html" %}
{% block title %}ZTA Chat{% endblock %}
{% block nav_chat %}active{% endblock %}
{% block content %}
<h1>ZTA Chat</h1>
<form id="chat-form" class="chat-form">
  <textarea
    id="chat-input"
    name="message"
    rows="3"
    required
    placeholder="Ask the analyst bot something..."
  ></textarea>
  <button id="chat-submit" type="submit">Send</button>
</form>

<section id="chat-messages" class="messages">
  <!-- populated by JavaScript streaming handler -->
</section>

<section id="chat-trace" class="trace">
  <h2>Tool trace</h2>
  <div id="chat-trace-list">
    <!-- populated by JavaScript streaming handler -->
  </div>
</section>
{% endblock %}
